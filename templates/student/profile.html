{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4>Edit Profile</h4>
          <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
        </div>

        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" name="name" class="form-control"
                   value="{{ student.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control"
                   value="{{ student.email }}" disabled>
            <small class="text-muted">Email cannot be changed.</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control"
                   value="{{ student.phone or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Education</label>
            <input type="text" name="education" class="form-control"
                   value="{{ student.education or '' }}"
                   placeholder="e.g. B.Tech CSE, IIT Madras">
          </div>
          <div class="mb-3">
            <label class="form-label">Skills</label>
            <input type="text" name="skills" class="form-control"
                   value="{{ student.skills or '' }}"
                   placeholder="Python, SQL, Flask">
          </div>
          <div class="mb-3">
            <label class="form-label">CGPA</label>
            <input type="number" step="0.01" min="0" max="10"
                   name="cgpa" class="form-control"
                   value="{{ student.cgpa or '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Resume (PDF/DOC/DOCX)</label>
            {% if student.resume_path %}
              <div class="mb-2">
                <a href="/static/{{ student.resume_path }}" target="_blank"
                   class="btn btn-outline-secondary btn-sm">
                  📄 View Current Resume
                </a>
              </div>
            {% endif %}
            <input type="file" name="resume" class="form-control"
                   accept=".pdf,.doc,.docx">
            <small class="text-muted">Max 5MB. Upload to replace existing resume.</small>
          </div>

          <button type="submit" class="btn btn-primary w-100">Save Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
