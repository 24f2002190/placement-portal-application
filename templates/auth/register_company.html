{% extends 'base.html' %}
{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow mt-4">
      <div class="card-body p-4">
        <h3 class="text-center mb-4">Company Registration</h3>
        <div class="alert alert-info">
          After registering, your account must be approved by the admin before you can log in.
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Company Name *</label>
            <input type="text" name="company_name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">HR Contact (phone/email)</label>
            <input type="text" name="hr_contact" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Website</label>
            <input type="url" name="website" class="form-control" placeholder="https://...">
          </div>
          <div class="mb-3">
            <label class="form-label">Company Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register Company</button>
        </form>
        <p class="text-center mt-3">Already approved? <a href="{{ url_for('auth.login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
