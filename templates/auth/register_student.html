{% extends 'base.html' %}
{% block title %}Student Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow mt-4">
      <div class="card-body p-4">
        <h3 class="text-center mb-4">Student Registration</h3>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Education (e.g. B.Tech CSE)</label>
            <input type="text" name="education" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Skills (comma separated)</label>
            <input type="text" name="skills" class="form-control" placeholder="Python, SQL, Flask">
          </div>
          <div class="mb-3">
            <label class="form-label">CGPA</label>
            <input type="number" step="0.01" min="0" max="10" name="cgpa" class="form-control">
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <p class="text-center mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
