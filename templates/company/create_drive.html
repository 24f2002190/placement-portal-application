{% extends 'base.html' %}
{% block title %}Create Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4>Create Placement Drive</h4>
          <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Job Title *</label>
            <input type="text" name="job_title" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Job Description</label>
            <textarea name="job_description" class="form-control" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Eligibility Criteria</label>
            <input type="text" name="eligibility" class="form-control"
                   placeholder="e.g. B.Tech CSE, min 7.0 CGPA">
          </div>
          <div class="mb-3">
            <label class="form-label">Skills Required</label>
            <input type="text" name="skills_required" class="form-control"
                   placeholder="e.g. Python, SQL, React">
          </div>
          <div class="mb-3">
            <label class="form-label">Salary Range</label>
            <input type="text" name="salary_range" class="form-control"
                   placeholder="e.g. 8–12 LPA">
          </div>
          <div class="mb-3">
            <label class="form-label">Application Deadline</label>
            <input type="date" name="application_deadline" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Submit for Approval</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
